<!DOCTYPE html>
<html>
<head>
  <title>CM COMPTA OHADA PRO</title>
</head>

<body>

<h1>📊 CM COMPTA OHADA PRO</h1>

<h2>📦 STOCK</h2>
<div id="stock"></div>

<h2>💰 VENTES</h2>
<div id="sales"></div>

<h2>👥 CLIENTS</h2>
<div id="clients"></div>

<h2>📊 DASHBOARD OHADA</h2>
<div id="dashboard"></div>

<button onclick="loadAll()">🔄 Actualiser</button>

<script>
const API = "https://cm-compta-backend.onrender.com";

/* ================= STOCK ================= */
async function loadStock() {
  let res = await fetch(API + "/stock");
  let data = await res.json();

  let html = "";
  let totalStock = 0;

  data.forEach(item => {
    html += `${item.produit} : ${item.quantite}<br>`;
    totalStock += item.quantite;
  });

  document.getElementById("stock").innerHTML = html;
  return totalStock;
}

/* ================= VENTES ================= */
async function loadSales() {
  let res = await fetch(API + "/sales");
  let data = await res.json();

  let html = "";
  let totalSales = 0;

  data.forEach(item => {
    html += `${item.produit} : ${item.montant} FCFA<br>`;
    totalSales += item.montant;
  });

  document.getElementById("sales").innerHTML = html;
  return totalSales;
}

/* ================= CLIENTS (SIMPLIFIÉ) ================= */
function loadClients() {
  let clients = [
    {nom: "Client A"},
    {nom: "Client B"},
    {nom: "Client C"}
  ];

  let html = "";
  clients.forEach(c => {
    html += c.nom + "<br>";
  });

  document.getElementById("clients").innerHTML = html;
}

/* ================= DASHBOARD OHADA ================= */
async function loadDashboard() {

  let stock = await loadStock();
  let sales = await loadSales();

  let benefice = sales; // version simple

  let statut = "";

  if (stock < 20) {
    statut = "⚠️ Stock faible";
  } else {
    statut = "✔ Stock normal";
  }

  document.getElementById("dashboard").innerHTML = `
    💰 CA : ${sales} FCFA <br>
    📦 Stock : ${stock} <br>
    📈 Bénéfice estimé : ${benefice} FCFA <br>
    🔔 Statut : ${statut}
  `;
}

/* ================= LOAD ALL ================= */
function loadAll() {
  loadDashboard();
  loadClients();
}

window.onload = loadAll;
</script>

</body>
</html>
