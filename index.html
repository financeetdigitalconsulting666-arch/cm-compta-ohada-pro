<script>
const API = "https://cm-compta-backend.onrender.com";

async function loadStock() {
  try {
    let res = await fetch(API + "/stock");
    let data = await res.json();
    document.getElementById("stock").innerText =
      JSON.stringify(data, null, 2);
  } catch (err) {
    document.getElementById("stock").innerText = "Erreur stock";
  }
}

async function loadSales() {
  try {
    let res = await fetch(API + "/sales");
    let data = await res.json();
    document.getElementById("sales").innerText =
      JSON.stringify(data, null, 2);
  } catch (err) {
    document.getElementById("sales").innerText = "Erreur ventes";
  }
}

function loadData() {
  loadStock();
  loadSales();
}

// Charger automatiquement au démarrage
window.onload = loadData;
</script>
